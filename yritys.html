<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sähkötekniikka Näkki Oy on Iittiläinen sähköalan yritys. Yrittäjä Joonas Näkki, sähköpätevyys 2 ja alle 3 kg kylmäainepätevyys.">
<title>Yritys – Sähkötekniikka Näkki Oy</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #fff;
    color: #333;
    line-height: 1.6;
  }
  .container {
    max-width: 1400px;
    margin: 0 auto;
    background: #fff;
    padding: 30px 50px;
  }
  /* Banner with logo image */
  .banner {
    background: #fff;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 0;
  }
  .banner img {
    max-width: 100%;
    height: auto;
    display: block;
  }
  /* Nav */
  nav {
    background: #1f5fbf;
    margin-top: 25px;
  }
  nav ul {
    list-style: none;
    display: flex;
    justify-content: space-around;
  }
  nav ul li {
    flex: 1;
    text-align: center;
  }
  nav ul li a {
    display: block;
    padding: 16px 10px;
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 2px;
  }
  nav ul li a:hover,
  nav ul li a.active {
    background: #174a96;
  }
  /* Content */
  .main {
    margin-top: 30px;
  }
  .main h2 {
    color: #0e1f4d;
    margin-bottom: 15px;
    font-size: 22px;
  }
  .main h3 {
    color: #0e1f4d;
    margin-top: 25px;
    margin-bottom: 12px;
    font-size: 18px;
  }
  .main p {
    margin-bottom: 15px;
    font-size: 15px;
    color: #444;
  }
  .info-block {
    background: #f8f8f8;
    padding: 20px 25px;
    border-radius: 8px;
    margin-bottom: 20px;
    border-left: 4px solid #1f5fbf;
  }
  .info-block h3 {
    margin-top: 0;
  }
  .info-block p:last-child {
    margin-bottom: 0;
  }
  .qualifications {
    list-style: none;
    padding: 0;
  }
  .qualifications li {
    padding: 10px 0 10px 30px;
    border-bottom: 1px solid #e5e5e5;
    position: relative;
    font-size: 15px;
    color: #444;
  }
  .qualifications li:last-child {
    border-bottom: none;
  }
  .qualifications li:before {
    content: "✓";
    position: absolute;
    left: 5px;
    color: #1f5fbf;
    font-weight: bold;
    font-size: 18px;
  }
  .owner {
    font-weight: bold;
    color: #0e1f4d;
  }
  /* Footer */
  footer {
    text-align: center;
    color: #888;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid #eee;
    font-size: 13px;
  }

  /* ===== Tabletti ===== */
  @media (max-width: 768px) {
    .container {
      margin: 0;
      padding: 15px;
    }
    .banner {
      padding: 10px;
    }
    nav ul li a {
      padding: 14px 6px;
      font-size: 12px;
      letter-spacing: 1px;
    }
  }

  /* ===== Mobiili ===== */
  @media (max-width: 480px) {
    body {
      font-size: 15px;
    }
    .container {
      padding: 10px;
    }
    .banner {
      padding: 5px;
    }
    nav {
      margin-top: 15px;
    }
    nav ul {
      flex-direction: column;
    }
    nav ul li {
      border-bottom: 1px solid #174a96;
    }
    nav ul li:last-child {
      border-bottom: none;
    }
    nav ul li a {
      padding: 14px 10px;
      font-size: 14px;
      letter-spacing: 2px;
    }
    .main h2 {
      font-size: 19px;
    }
    .main h3 {
      font-size: 17px;
    }
    .info-block {
      padding: 15px 18px;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <!-- Logo as banner -->
    <div class="banner">
      <img src="logo.png" alt="Sähkötekniikka Näkki Oy">
    </div>

    <!-- Navigation -->
    <nav>
      <ul>
        <li><a href="index.html">ETUSIVU</a></li>
        <li><a href="palvelut.html">PALVELUT</a></li>
        <li><a href="yritys.html" class="active">YRITYS</a></li>
        <li><a href="yhteystiedot.html">YHTEYSTIEDOT</a></li>
      </ul>
    </nav>

    <!-- Content -->
    <div class="main">
      <h2>Yritys</h2>

      <div class="info-block">
        <p>Sähkötekniikka Näkki Oy on Iittiläinen sähköalan yritys, joka sai alkunsa kiinnostuksesta sähköalaa ja yrittäjyyttä kohtaan.</p>
        <p>Yrittäjä <span class="owner">Joonas Näkki</span></p>
      </div>

      <div class="info-block">
        <h3>Pätevyydet</h3>
        <ul class="qualifications">
          <li>Sähköpätevyys 2</li>
          <li>Alle 3 kg kylmäainepätevyys</li>
        </ul>
      </div>
    </div>

    <footer>
      © Sähkötekniikka Näkki Oy
    </footer>
  </div>
</body>
</html>
